<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;
  background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
  padding-bottom:40px;
}

.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600}
.status-r{display:flex;gap:6px;align-items:center}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}

.content{padding:0 20px}

/* Header */
.hdr{padding:16px 0 4px;display:flex;align-items:center;gap:12px}
.bk{width:44px;height:44px;border-radius:50%;border:none;background:#EDE4D6;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr h2{flex:1;text-align:center;font-size:22px;font-weight:700;color:#3A2A1A}
.sp{width:44px}

/* Filter pills */
.filters{display:flex;gap:8px;margin-top:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-pill{
  flex-shrink:0;height:40px;padding:0 20px;border-radius:20px;border:none;
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  background:rgba(58,42,26,.06);color:#876B45;
}
.filter-pill.on{background:#3A2A1A;color:#FAF7F2}

/* Month header */
.month-hdr{font-size:20px;font-weight:700;color:#3A2A1A;margin-top:24px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(58,42,26,.08)}

/* Session card */
.sess-card{
  display:flex;align-items:center;gap:16px;
  padding:20px;border-radius:20px;
  background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 12px rgba(58,42,26,.05),0 1px 2px rgba(58,42,26,.03);
  margin-bottom:12px;
  position:relative;overflow:hidden;
}
.sess-card::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9) 30%,rgba(255,255,255,.9) 70%,transparent);
  pointer-events:none;
}
.sess-ic{
  width:56px;height:56px;border-radius:14px;
  background:#D6F0D6;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.sess-info{flex:1}
.sess-part{font-size:14px;font-weight:600;color:#876B45}
.sess-kcal{font-size:24px;font-weight:700;color:#9B7E56;margin-top:2px}
.sess-date{font-size:14px;color:#876B45;text-align:right;white-space:nowrap}
</style>
</head>
