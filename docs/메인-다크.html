<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;
  background:#1C1C1E;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#FFFFFF;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;
  overflow-x:hidden;
  padding-bottom:110px;
}

.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600;color:#fff}
.status-r{display:flex;gap:6px;align-items:center}
.island{width:126px;height:36px;background:#000;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}

.content{padding:0 20px}
.hdr{padding:16px 0 4px}
.hdr h1{font-size:30px;font-weight:700;letter-spacing:-.03em;color:#fff}
.hdr-sub{font-size:13px;color:#E0D6C8;margin-bottom:24px}

.gc{
  position:relative;padding:24px;border-radius:20px;
  background:rgba(44,44,46,.9);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 2px 20px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.15);
  overflow:hidden;
}
.gc::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14) 30%,rgba(255,255,255,.14) 70%,transparent);
  pointer-events:none;z-index:2;
}
.gc::after{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,transparent 100%);
  border-radius:20px 20px 0 0;pointer-events:none;z-index:1;
}

.hero{display:flex;align-items:center;gap:20px;position:relative;z-index:3}
.hero-label{font-size:13px;color:#B8A898;font-weight:500;margin-bottom:2px}
.hero-part{font-size:24px;font-weight:700;color:#fff}
.hero-sets{font-size:24px;font-weight:700;color:#D4883A}
.hero-arrow{color:#8C7E6E;font-size:20px;flex-shrink:0}
.ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring svg{transform:rotate(-90deg)}
.ring-num{position:absolute;font-size:24px;font-weight:700;color:#fff}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gc-in{position:relative;z-index:3}

.stat-label{font-size:13px;color:#B8A898;font-weight:600}
.stat-sub{font-size:13px;color:#B8A898;margin-top:1px}
.stat-val{font-size:36px;font-weight:700;color:#D4883A;line-height:1;margin-top:12px}
.stat-unit{font-size:14px;font-weight:500;color:#B8A898;margin-left:2px}

.link-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.link-title{font-size:13px;font-weight:600;color:#B8A898}
.link-arrow{font-size:18px;color:#8C7E6E}
.link-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;background:rgba(52,199,89,.15)}
.link-part{font-size:15px;font-weight:700;color:#fff}
.link-kcal{font-size:22px;font-weight:700;color:#D4883A;margin-top:2px}
.link-day{font-size:13px;color:#B8A898;margin-top:8px}
.link-start{display:flex;align-items:center;gap:4px;margin-top:8px;font-size:15px;font-weight:600;color:#34C759}
.link-dot{width:8px;height:8px;border-radius:4px;background:#34C759}
.link-big-icon{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}

.ws-row{display:flex;align-items:center;gap:12px;padding:10px 0;min-height:44px}
.ws-row+.ws-row{border-top:1px solid rgba(255,255,255,.06)}
.ws-ic{width:40px;height:40px;border-radius:10px;background:rgba(52,199,89,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ws-part{font-size:15px;font-weight:600;color:#fff}
.ws-meta{font-size:13px;color:#B8A898;margin-top:1px}
.ws-kcal{text-align:right;margin-left:auto}
.ws-num{font-size:15px;font-weight:700;color:#D4883A}
.ws-unit{font-size:11px;color:#B8A898}

.btm{margin-top:24px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
.btm-btn{width:100%;height:52px;border-radius:14px;border:none;background:rgba(255,255,255,.08);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px}
.btm-btn:last-child{margin-bottom:0}

.dock{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  padding:0 20px 8px;
  background:linear-gradient(to top,#1C1C1E 60%,rgba(28,28,30,0));
}
.pill{
  display:flex;align-items:center;
  background:rgba(45,45,48,.95);border-radius:22px;padding:6px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
}
.pill-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:transparent;border:none;border-radius:16px;padding:10px 0;
  cursor:pointer;min-height:52px;
}
.pill-btn.on{background:#D4883A}
.pill-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.pill-ic svg{width:20px;height:20px}
.pill-lb{font-size:11px;font-weight:600;color:rgba(255,255,255,.7)}
.pill-btn.on .pill-lb{color:#1C1C1E}
.pill-btn .pill-ic svg *{stroke:rgba(255,255,255,.7);fill:none}
.pill-btn.on .pill-ic svg *{stroke:#1C1C1E}
.home-ind{width:134px;height:5px;background:#fff;opacity:.15;border-radius:3px;margin:8px auto 0}

.sec{margin-bottom:16px}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#fff"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#fff"/><path d="M14.5 4.5v3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="content">
  <div class="hdr"><h1>요약</h1></div>
  <div class="hdr-sub">3월 15일 일요일</div>

  <div class="sec"><div class="gc">
    <div class="hero">
      <div class="ring" style="width:90px;height:90px;flex-shrink:0"><svg width="90" height="90"><circle cx="45" cy="45" r="35" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="10"/><circle cx="45" cy="45" r="35" fill="none" stroke="#D4883A" stroke-width="10" stroke-dasharray="219.9" stroke-dashoffset="55" stroke-linecap="round"/></svg><span class="ring-num">18</span></div>
      <div style="flex:1"><div class="hero-label">오늘의 운동</div><div class="hero-part">가슴</div><div class="hero-sets">18세트</div></div>
      <div class="hero-arrow">›</div>
    </div>
  </div></div>

  <div class="g2 sec">
    <div class="gc"><div class="gc-in"><div class="stat-label">운동시간</div><div class="stat-sub">오늘</div><div class="stat-val">43<span class="stat-unit">분</span></div></div></div>
    <div class="gc"><div class="gc-in"><div class="stat-label">세트수</div><div class="stat-sub">오늘</div><div class="stat-val">18<span class="stat-unit">세트</span></div></div></div>
  </div>

  <div class="g2 sec">
    <div class="gc"><div class="gc-in">
      <div class="link-hdr"><div class="link-title">세션</div><div class="link-arrow">›</div></div>
      <div class="link-icon"><svg width="24" height="24" viewBox="0 0 48 48" fill="none"><g stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#34C759"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#34C759"/></g></svg></div>
      <div class="link-part">가슴</div><div class="link-kcal">262KCAL</div><div class="link-day">토요일</div>
    </div></div>
    <div class="gc"><div class="gc-in">
      <div class="link-hdr"><div class="link-title">운동</div><div class="link-arrow">›</div></div>
      <div class="link-big-icon"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><g stroke="#D4883A" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#D4883A"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#D4883A"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#D4883A"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#D4883A"/></g></svg></div>
      <div style="text-align:center"><div style="font-size:15px;font-weight:700">근력 강화 운동</div>
      <div class="link-start" style="justify-content:center;margin-top:10px"><div class="link-dot"></div> 운동 시작</div></div>
    </div></div>
  </div>

  <div class="sec"><div class="gc"><div class="gc-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="font-size:15px;font-weight:700">이번 주 세션</div><div style="font-size:13px;color:#8C7E6E">더보기 →</div></div>
    <div class="ws-row"><div class="ws-ic"><svg width="22" height="22" viewBox="0 0 48 48" fill="none"><g stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#34C759"/></g></svg></div><div style="flex:1"><div class="ws-part">가슴</div><div class="ws-meta">일요일 · 43분 · 18세트</div></div><div class="ws-kcal"><div class="ws-num">262</div><div class="ws-unit">KCAL</div></div></div>
    <div class="ws-row"><div class="ws-ic"><svg width="22" height="22" viewBox="0 0 48 48" fill="none"><g stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#34C759"/></g></svg></div><div style="flex:1"><div class="ws-part">등</div><div class="ws-meta">토요일 · 51분 · 20세트</div></div><div class="ws-kcal"><div class="ws-num">279</div><div class="ws-unit">KCAL</div></div></div>
    <div class="ws-row"><div class="ws-ic"><svg width="22" height="22" viewBox="0 0 48 48" fill="none"><g stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#34C759"/></g></svg></div><div style="flex:1"><div class="ws-part">하체</div><div class="ws-meta">금요일 · 38분 · 16세트</div></div><div class="ws-kcal"><div class="ws-num">232</div><div class="ws-unit">KCAL</div></div></div>
    <div class="ws-row"><div class="ws-ic"><svg width="22" height="22" viewBox="0 0 48 48" fill="none"><g stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#34C759"/></g></svg></div><div style="flex:1"><div class="ws-part">어깨</div><div class="ws-meta">목요일 · 35분 · 15세트</div></div><div class="ws-kcal"><div class="ws-num">210</div><div class="ws-unit">KCAL</div></div></div>
  </div></div></div>

  <div class="btm">
    <button class="btm-btn">요약 편집</button>
    <button class="btm-btn">모든 카테고리 보기</button>
  </div>
</div>

<div class="dock">
  <div class="pill">
    <button class="pill-btn on"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="4" y="13" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="13" y="4" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="13" y="13" width="7" height="7" rx="1.5" stroke-width="1.8"/></svg></span><span class="pill-lb">일지</span></button>
    <button class="pill-btn"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke-width="1.8"/><path d="M12 8v4l2.5 2.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="pill-lb">템포</span></button>
    <button class="pill-btn"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><path d="M8 12a4 4 0 108 0 4 4 0 00-8 0z" stroke-width="1.8"/><path d="M12 4v2M12 18v2M4 12h2M18 12h2" stroke-width="1.8" stroke-linecap="round"/></svg></span><span class="pill-lb">프로틴</span></button>
  </div>
  <div class="home-ind"></div>
</div>

</body>
</html>
