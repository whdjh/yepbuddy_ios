<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;
  background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
  padding-bottom:40px;
}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600}
.status-r{display:flex;gap:6px;align-items:center}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}
.content{padding:0 20px}

.hdr{padding:16px 0 4px;display:flex;align-items:center;gap:12px}
.bk{width:44px;height:44px;border-radius:50%;border:none;background:#EDE4D6;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr h2{flex:1;text-align:center;font-size:22px;font-weight:700;color:#3A2A1A}
.sp{width:44px}

/* Icon */
.icon-wrap{display:flex;justify-content:center;margin-top:24px}
.icon-circle{width:80px;height:80px;border-radius:50%;background:#EDE4D6;display:flex;align-items:center;justify-content:center}

/* Sections */
.sec-title{font-size:18px;font-weight:700;color:#3A2A1A;margin-top:32px;margin-bottom:12px}

/* Body part pills */
.parts{display:flex;flex-wrap:wrap;gap:10px}
.part-pill{
  height:40px;padding:0 20px;border-radius:20px;
  border:1.5px solid #D5CFC6;background:transparent;
  font-size:14px;font-weight:600;color:#3A2A1A;
  cursor:pointer;font-family:inherit;
}
.part-pill.on{background:#3A2A1A;color:#FAF7F2;border-color:#3A2A1A}

/* Set count */
.set-box{
  display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:56px;border-radius:14px;
  border:1.5px solid #D5CFC6;background:transparent;
  font-size:28px;font-weight:700;color:#3A2A1A;
}

/* Memo */
.memo-area{
  width:100%;min-height:160px;border-radius:16px;
  border:1.5px solid #D5CFC6;background:transparent;
  padding:16px;font-size:15px;color:#3A2A1A;
  font-family:inherit;resize:vertical;outline:none;
}
.memo-area::placeholder{color:#B8A898}
.memo-hint{font-size:13px;color:#9B8E7A;margin-top:8px}

/* Buttons */
.btn-primary{
  width:100%;height:56px;border-radius:14px;border:none;
  background:#9B7E56;color:#FAF7F2;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-top:32px;
}
.btn-secondary{
  width:100%;height:56px;border-radius:14px;
  border:1.5px solid #D5CFC6;background:transparent;
  color:#3A2A1A;
  font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;
  margin-top:12px;
}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#3A2A1A"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#3A2A1A" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#3A2A1A"/><path d="M14.5 4.5v3" stroke="#3A2A1A" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="content">
  <div class="hdr">
    <button class="bk"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4L6.5 10l6 6" stroke="#3A2A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <h2>운동 기록</h2>
    <div class="sp"></div>
  </div>

  <div class="icon-wrap">
    <div class="icon-circle"><svg width="36" height="36" viewBox="0 0 48 48" fill="none"><g stroke="#9B7E56" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#9B7E56"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#9B7E56"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#9B7E56"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#9B7E56"/></g></svg></div>
  </div>

  <div class="sec-title">운동 부위</div>
  <div class="parts">
    <button class="part-pill">가슴</button>
    <button class="part-pill">등</button>
    <button class="part-pill">하체</button>
    <button class="part-pill">어깨</button>
    <button class="part-pill">팔</button>
    <button class="part-pill">코어</button>
  </div>

  <div class="sec-title">세트수</div>
  <div class="set-box">0</div>

  <div class="sec-title">메모</div>
  <textarea class="memo-area" placeholder="운동 메모를 자유롭게 작성하세요..."></textarea>
  <div class="memo-hint">운동 전·중·후 언제든 수정 가능</div>

  <button class="btn-primary">운동 시작</button>
  <button class="btn-secondary">캘린더에 등록</button>
</div>
</body>
</html>
