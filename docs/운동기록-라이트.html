<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;
  background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
  padding-bottom:40px;
}

.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600}
.status-r{display:flex;gap:6px;align-items:center}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}

.content{padding:0 20px}

/* Header */
.hdr{padding:16px 0 4px;display:flex;align-items:center;gap:12px}
.bk{width:44px;height:44px;border-radius:50%;border:none;background:#EDE4D6;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr h2{flex:1;text-align:center;font-size:22px;font-weight:700;color:#3A2A1A}
.sp{width:44px}

/* Session info row */
.sess{display:flex;align-items:center;gap:16px;padding:20px 0}
.sess-ic{width:64px;height:64px;border-radius:16px;background:#D6F0D6;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sess-part{font-size:20px;font-weight:700;color:#3A2A1A}
.sess-meta{font-size:14px;color:#876B45;margin-top:2px}

/* Section title */
.sec-title{font-size:18px;font-weight:700;color:#3A2A1A;margin:24px 0 12px}

/* Memo card */
.memo{
  border-radius:20px;
  background:#3A2A1A;
  min-height:340px;
  padding:24px;
  display:flex;flex-direction:column;justify-content:flex-end;
  position:relative;overflow:hidden;
}
.memo-text{font-size:15px;color:rgba(250,247,242,.5);font-weight:400}

/* Glass card */
.gc{
  padding:24px;border-radius:20px;
  background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 16px rgba(58,42,26,.07),0 1px 2px rgba(58,42,26,.04);
  position:relative;overflow:hidden;
}
.gc::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9) 30%,rgba(255,255,255,.9) 70%,transparent);
  pointer-events:none;z-index:2;
}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.stat-item{padding:16px 0}
.stat-item:nth-child(1),.stat-item:nth-child(2){border-bottom:1px solid rgba(58,42,26,.06)}
.stat-label{font-size:13px;color:#876B45;font-weight:500}
.stat-val{font-size:28px;font-weight:700;color:#9B7E56;margin-top:4px;letter-spacing:-.02em}

/* HR Chart card */
.hr-card{
  padding:20px;border-radius:20px;
  background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 16px rgba(58,42,26,.07),0 1px 2px rgba(58,42,26,.04);
}
.hr-chart{position:relative;height:180px;margin:8px 0 12px}
.hr-labels{display:flex;justify-content:space-between;font-size:13px;color:#876B45;font-weight:500}
.hr-avg{text-align:center;font-size:14px;font-weight:600;color:#876B45;margin-top:4px}

/* Map card */
.map-card{
  border-radius:20px;
  background:#EDE4D6;
  height:220px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.map-dot{width:10px;height:10px;border-radius:5px;background:#4A8C4A;box-shadow:0 0 0 3px rgba(74,140,74,.2)}
.map-label{
  position:absolute;bottom:16px;right:16px;
  background:rgba(255,255,255,.8);
  border-radius:8px;padding:6px 12px;
  font-size:12px;font-weight:600;color:#876B45;
}

/* Bottom action */
.btm-action{display:flex;justify-content:center;padding:24px 0}
.btm-icon{
  width:56px;height:56px;border-radius:16px;
  background:#3A2A1A;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(58,42,26,.15);
}

.home-ind{width:134px;height:5px;background:#3A2A1A;opacity:.15;border-radius:3px;margin:8px auto 0}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#3A2A1A"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#3A2A1A" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#3A2A1A"/><path d="M14.5 4.5v3" stroke="#3A2A1A" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="content">
  <!-- Header -->
  <div class="hdr">
    <button class="bk"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4L6.5 10l6 6" stroke="#3A2A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <h2>3월 15일</h2>
    <div class="sp"></div>
  </div>

  <!-- Session info -->
  <div class="sess">
    <div class="sess-ic"><svg width="28" height="28" viewBox="0 0 48 48" fill="none"><g stroke="#2E5A2E" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#2E5A2E"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#2E5A2E"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#2E5A2E"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#2E5A2E"/></g></svg></div>
    <div>
      <div class="sess-part">가슴</div>
      <div class="sess-meta">2026-03-15 · 43분</div>
    </div>
  </div>

  <!-- 메모 -->
  <div class="sec-title">메모</div>
  <div class="memo">
    <div class="memo-text">벤치프레스 무게 올림 80kg 성공</div>
  </div>

  <!-- 운동 세부사항 -->
  <div class="sec-title">운동 세부사항</div>
  <div class="gc">
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-label">운동 시간</div><div class="stat-val">0:43:00</div></div>
      <div class="stat-item"><div class="stat-label">활동 칼로리</div><div class="stat-val">262KCAL</div></div>
      <div class="stat-item"><div class="stat-label">세트수</div><div class="stat-val">18세트</div></div>
      <div class="stat-item"><div class="stat-label">평균 심박수</div><div class="stat-val">126BPM</div></div>
    </div>
  </div>

  <!-- 심박수 -->
  <div class="sec-title">심박수</div>
  <div class="hr-card">
    <div class="hr-chart">
      <svg width="100%" height="180" viewBox="0 0 320 180" preserveAspectRatio="none">
        <!-- Dashed grid lines -->
        <line x1="0" y1="20" x2="320" y2="20" stroke="#C4B8A4" stroke-width="1" stroke-dasharray="4 4" opacity=".4"/>
        <line x1="0" y1="90" x2="320" y2="90" stroke="#C4B8A4" stroke-width="1" stroke-dasharray="4 4" opacity=".4"/>
        <line x1="0" y1="155" x2="320" y2="155" stroke="#C4B8A4" stroke-width="1" stroke-dasharray="4 4" opacity=".15"/>
        <!-- Area fill -->
        <path d="M0,140 L10,120 25,60 35,30 45,80 60,55 75,100 90,45 105,75 120,110 140,60 155,90 170,80 185,100 200,70 215,95 230,60 245,85 255,105 270,55 285,75 300,90 310,60 320,80 L320,180 L0,180 Z" fill="url(#hrGrad)" opacity=".3"/>
        <!-- Line -->
        <path d="M0,140 L10,120 25,60 35,30 45,80 60,55 75,100 90,45 105,75 120,110 140,60 155,90 170,80 185,100 200,70 215,95 230,60 245,85 255,105 270,55 285,75 300,90 310,60 320,80" fill="none" stroke="#9B7E56" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <!-- Max point (red) -->
        <circle cx="35" cy="30" r="4" fill="#E05555"/>
        <!-- Start/End points -->
        <circle cx="0" cy="140" r="4" fill="none" stroke="#9B7E56" stroke-width="2"/>
        <circle cx="320" cy="80" r="4" fill="none" stroke="#9B7E56" stroke-width="2"/>
        <!-- Start value -->
        <text x="8" y="154" font-size="11" font-weight="600" fill="#876B45">85</text>
        <!-- End value -->
        <text x="302" y="96" font-size="11" font-weight="600" fill="#876B45">87</text>
        <!-- Avg line -->
        <line x1="0" y1="90" x2="320" y2="90" stroke="#9B7E56" stroke-width="1" stroke-dasharray="6 3" opacity=".5"/>
        <text x="268" y="84" font-size="10" font-weight="600" fill="#876B45">평균 126</text>
        <defs><linearGradient id="hrGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9B7E56" stop-opacity=".4"/><stop offset="100%" stop-color="#9B7E56" stop-opacity="0"/></linearGradient></defs>
      </svg>
    </div>
    <div class="hr-labels"><span>시작</span><span style="font-weight:700">평균 126BPM</span><span>종료</span></div>
  </div>

  <!-- 지도 -->
  <div class="sec-title">지도</div>
  <div class="map-card">
    <div class="map-dot"></div>
    <div class="map-label">운동 위치</div>
  </div>

  <!-- Bottom action -->
  <div class="btm-action">
    <div class="btm-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="6" y="3" width="12" height="18" rx="2" stroke="#FAF7F2" stroke-width="1.8"/><path d="M9 3V1.5a.5.5 0 01.5-.5h5a.5.5 0 01.5.5V3" stroke="#FAF7F2" stroke-width="1.8" stroke-linecap="round"/><line x1="9" y1="9" x2="15" y2="9" stroke="#FAF7F2" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="12.5" x2="13" y2="12.5" stroke="#FAF7F2" stroke-width="1.5" stroke-linecap="round"/></svg></div>
  </div>

  <div class="home-ind"></div>
</div>

</body>
</html>
