<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;height:852px;
  background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;
}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}
.status{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600;color:#3A2A1A;z-index:10}
.status-r{display:flex;gap:6px;align-items:center}

.main{
  width:100%;height:100%;
  padding:100px 24px 120px;
  display:flex;flex-direction:column;justify-content:flex-start;
}

.hr-big{display:flex;align-items:center;gap:8px;margin-bottom:40px}
.hr-num{font-size:80px;font-weight:700;color:#3A2A1A;line-height:1}
.hr-heart{font-size:28px;color:#9B7E56;margin-top:12px}

.cal-row{display:flex;gap:48px}
.cal-num{font-size:44px;font-weight:700;color:#3A2A1A;line-height:1}
.cal-label{font-size:13px;color:#876B45;margin-top:8px;font-weight:500}

.bottom-sheet{
  position:absolute;bottom:-20px;left:0;right:0;z-index:100;
  background:rgba(58,47,36,.92);
  border-radius:20px 20px 0 0;
  padding:10px 24px 50px;
}
.sheet-handle{width:40px;height:5px;background:rgba(255,255,255,.3);border-radius:3px;margin:0 auto 16px}
.sheet-row{display:flex;align-items:center;justify-content:center;gap:24px}
.sheet-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.timer{font-size:32px;font-weight:700;color:#fff;letter-spacing:.02em;font-variant-numeric:tabular-nums}
.mini-ring{position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#3A2A1A"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#3A2A1A" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#3A2A1A"/><path d="M14.5 4.5v3" stroke="#3A2A1A" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="main">
  <div class="hr-big">
    <span class="hr-num">69</span>
    <span class="hr-heart">♥</span>
  </div>
  <div class="cal-row">
    <div>
      <div class="cal-num">0</div>
      <div class="cal-label">활동 킬로칼로리</div>
    </div>
    <div>
      <div class="cal-num">0</div>
      <div class="cal-label">총 킬로칼로리</div>
    </div>
  </div>
</div>

<div class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-row">
    <div class="sheet-icon">
      <svg width="22" height="22" viewBox="0 0 48 48" fill="none"><g stroke="#E0D6C8" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#E0D6C8"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#E0D6C8"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#E0D6C8"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#E0D6C8"/></g></svg>
    </div>
    <div class="timer">00:32.52</div>
    <div class="mini-ring">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="4" transform="rotate(-90 20 20)"/>
        <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(200,173,126,.7)" stroke-width="4" stroke-dasharray="100.5" stroke-dashoffset="75" stroke-linecap="round" transform="rotate(-90 20 20)"/>
      </svg>
    </div>
  </div>
</div>

</body>
</html>
