<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;
  background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
  padding-bottom:110px;
}

/* Status */
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600}
.status-r{display:flex;gap:6px;align-items:center}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}

.content{padding:0 20px}

/* Header */
.hdr{padding:16px 0 4px;display:flex;align-items:center;gap:12px}
.bk{width:44px;height:44px;border-radius:12px;border:none;background:#EDE4D6;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr h2{flex:1;text-align:center;font-size:22px;font-weight:700;color:#3A2A1A}
.sp{width:44px}

/* Day headers */
.dh{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px 0 8px}
.dh span{text-align:center;font-size:12px;font-weight:600;color:#9B8E7A}

/* Month */
.ms{margin-bottom:32px}
.ms-title{font-size:22px;font-weight:700;text-align:right;margin-bottom:12px;color:#3A2A1A}

.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cd{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 0;min-height:68px}
.cd-num{font-size:13px;font-weight:600;color:#5A4A36;line-height:1}
.cd-num.today{background:#9B7E56;color:#FFF;width:24px;height:24px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cd-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.cd-dot{width:5px;height:5px;border-radius:3px;background:#4A8C4A;position:absolute;top:-1px;right:-1px}

/* Detail card */
.gc{
  position:relative;padding:24px;border-radius:20px;
  background:rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 16px rgba(58,42,26,.07),0 1px 2px rgba(58,42,26,.04);
  overflow:hidden;margin-top:24px;
}
.gc::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.9) 30%,rgba(255,255,255,.9) 70%,transparent);
  pointer-events:none;z-index:2;
}
.gc::after{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.35) 0%,transparent 100%);
  border-radius:20px 20px 0 0;pointer-events:none;z-index:1;
}
.gc-in{position:relative;z-index:3}
.dt{font-size:15px;font-weight:700;color:#3A2A1A;margin-bottom:4px}
.dm{font-size:13px;color:#876B45}
.dr{display:flex;gap:16px;margin-top:16px}
.ds{flex:1}
.dl{font-size:12px;color:#876B45}
.dv{font-size:20px;font-weight:700;color:#9B7E56;margin-top:2px}

/* Dock */
.dock{
  position:absolute;bottom:0;left:0;right:0;z-index:100;
  padding:0 20px 8px;
  background:linear-gradient(to top,#FAF7F2 60%,rgba(250,247,242,0));
}
.pill{display:flex;align-items:center;background:#3A2A1A;border-radius:22px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.pill-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;border-radius:16px;padding:10px 0;cursor:pointer;min-height:52px}
.pill-btn.on{background:#9B7E56}
.pill-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.pill-ic svg{width:20px;height:20px}
.pill-lb{font-size:11px;font-weight:600;color:rgba(250,247,242,.7)}
.pill-btn.on .pill-lb{color:#FAF7F2}
.pill-btn .pill-ic svg *{stroke:rgba(250,247,242,.7);fill:none}
.pill-btn.on .pill-ic svg *{stroke:#FAF7F2}
.home-ind{width:134px;height:5px;background:#3A2A1A;opacity:.15;border-radius:3px;margin:8px auto 0}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#3A2A1A"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#3A2A1A" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#3A2A1A"/><path d="M14.5 4.5v3" stroke="#3A2A1A" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="content">
  <div class="hdr">
    <button class="bk"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4L6.5 10l6 6" stroke="#3A2A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <h2>캘린더</h2>
    <div class="sp"></div>
  </div>

  <div class="dh"><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span></div>

  <div id="months"></div>

  <div class="gc"><div class="gc-in">
    <div class="dt">3월 15일 일요일 — 가슴</div>
    <div class="dm">43분 · 18세트 · 262KCAL</div>
    <div class="dr">
      <div class="ds"><div class="dl">운동시간</div><div class="dv">43분</div></div>
      <div class="ds"><div class="dl">세트수</div><div class="dv">18세트</div></div>
      <div class="ds"><div class="dl">칼로리</div><div class="dv">262</div></div>
      <div class="ds"><div class="dl">심박수</div><div class="dv">126</div></div>
    </div>
  </div></div>
</div>

<div class="dock">
  <div class="pill">
    <button class="pill-btn on"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="4" y="13" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="13" y="4" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="13" y="13" width="7" height="7" rx="1.5" stroke-width="1.8"/></svg></span><span class="pill-lb">일지</span></button>
    <button class="pill-btn"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke-width="1.8"/><path d="M12 8v4l2.5 2.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="pill-lb">템포</span></button>
    <button class="pill-btn"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><path d="M8 12a4 4 0 108 0 4 4 0 00-8 0z" stroke-width="1.8"/><path d="M12 4v2M12 18v2M4 12h2M18 12h2" stroke-width="1.8" stroke-linecap="round"/></svg></span><span class="pill-lb">프로틴</span></button>
  </div>
  <div class="home-ind"></div>
</div>

<script>
const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const data={
  '2026-3':{1:.8,2:.6,3:.75,4:.9,5:.85,6:.5,7:.7,8:.15,9:.55,10:.8,11:.65,12:.7,13:.6,14:.85,15:1,16:.5,17:.7},
  '2026-2':{2:.6,4:.8,5:.5,7:.9,9:.7,11:.85,13:.6,15:.75,17:.65,19:.5,21:.8,23:.7,25:.9,27:.6,28:.55},
  '2026-1':{3:.7,5:.6,7:.8,10:.5,12:.9,14:.65,16:.75,18:.8,20:.6,22:.7,24:.85,26:.5,28:.9,30:.65,31:.7}
};
const todayY=2026,todayM=3,todayD=18;

function ring(pct,sz){
  const r=(sz-6)/2,ci=2*Math.PI*r,off=ci*(1-Math.min(pct,1));
  const tr=pct>0?'#EDE4D6':'rgba(155,126,86,.12)';
  const ac='#9B7E56';
  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${tr}" stroke-width="5"/>${pct>0?`<circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${ac}" stroke-width="5" stroke-dasharray="${ci}" stroke-dashoffset="${off}" stroke-linecap="round"/>`:''}</svg>`;
}
function firstDayOfMonth(y,m){let d=new Date(y,m-1,1).getDay();return d===0?6:d-1;}
function daysInMonth(y,m){return new Date(y,m,0).getDate();}

function renderMonth(y,m){
  const key=`${y}-${m}`,sess=data[key]||{},fd=firstDayOfMonth(y,m),dm=daysInMonth(y,m),isCur=(y===todayY&&m===todayM);
  let h=`<div class="ms"><div class="ms-title">${MN[m-1]}</div><div class="cg">`;
  for(let i=0;i<fd;i++) h+='<div class="cd"></div>';
  for(let d=1;d<=dm;d++){
    const pct=sess[d]||0,isToday=isCur&&d===todayD;
    h+=`<div class="cd"><span class="cd-num${isToday?' today':''}">${d}</span><div class="cd-ring">${ring(pct,38)}${pct>0?'<div class="cd-dot"></div>':''}</div></div>`;
  }
  h+='</div></div>';return h;
}
document.getElementById('months').innerHTML=[[2026,3],[2026,2],[2026,1]].map(([y,m])=>renderMonth(y,m)).join('');
</script>
</body>
</html>
