<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;
  background:#1C1C1E;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#FFFFFF;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;
  padding-bottom:40px;
}

.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600;color:#fff}
.status-r{display:flex;gap:6px;align-items:center}
.island{width:126px;height:36px;background:#000;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}

.content{padding:0 20px}

.hdr{padding:16px 0 4px;display:flex;align-items:center;gap:12px}
.bk{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr h2{flex:1;text-align:center;font-size:22px;font-weight:700;color:#fff}
.sp{width:44px}

.sess{display:flex;align-items:center;gap:14px;margin-top:24px}
.sess-ic{width:64px;height:64px;border-radius:16px;background:rgba(52,199,89,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sess-part{font-size:20px;font-weight:700;color:#fff}
.sess-meta{font-size:14px;color:#B8A898;margin-top:2px}

.sec-title{font-size:20px;font-weight:700;color:#fff;margin-top:32px;margin-bottom:12px}

/* Memo card - dark on dark */
.memo-card{
  width:100%;min-height:360px;border-radius:20px;
  background:#2C2C2E;
  padding:24px;
  display:flex;align-items:flex-end;
  position:relative;overflow:hidden;
}
.memo-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(44,44,46,.6) 0%,transparent 100%);
  border-radius:20px 20px 0 0;pointer-events:none;
}
.memo-text{font-size:15px;color:rgba(255,255,255,.35);font-weight:400;position:relative;z-index:1}

/* Stats card */
.stats-card{
  border-radius:20px;
  background:rgba(44,44,46,.9);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 2px 20px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.15);
  padding:24px;
  overflow:hidden;position:relative;
}
.stats-card::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14) 30%,rgba(255,255,255,.14) 70%,transparent);
  pointer-events:none;z-index:2;
}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.stat-label{font-size:13px;color:#B8A898;font-weight:500}
.stat-val{font-size:28px;font-weight:700;color:#D4883A;margin-top:4px;letter-spacing:-.02em}

/* HR chart card */
.hr-card{
  border-radius:20px;
  background:rgba(44,44,46,.9);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 2px 20px rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.15);
  padding:24px 20px 16px;
  overflow:hidden;position:relative;
}
.hr-card::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.14) 30%,rgba(255,255,255,.14) 70%,transparent);
  pointer-events:none;z-index:2;
}
.hr-chart{position:relative;height:180px;margin-bottom:12px}
.hr-chart svg{width:100%;height:100%}
.hr-footer{display:flex;justify-content:space-between;align-items:center}
.hr-foot-label{font-size:13px;color:#B8A898}
.hr-foot-center{font-size:14px;font-weight:700;color:#fff}

/* Map card */
.map-card{
  border-radius:20px;
  background:#2C2C2E;
  height:220px;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.map-dot{width:12px;height:12px;border-radius:6px;background:#34C759;box-shadow:0 0 0 4px rgba(52,199,89,.2)}
.map-label{position:absolute;bottom:16px;right:16px;background:rgba(255,255,255,.1);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}

/* Bottom action */
.bottom-action{display:flex;justify-content:center;margin-top:32px;padding-bottom:20px}
.action-btn{width:56px;height:56px;border-radius:16px;background:rgba(255,255,255,.1);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2)}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#fff"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#fff"/><path d="M14.5 4.5v3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="content">

  <div class="hdr">
    <button class="bk"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4L6.5 10l6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <h2>3월 15일</h2>
    <div class="sp"></div>
  </div>

  <div class="sess">
    <div class="sess-ic"><svg width="30" height="30" viewBox="0 0 48 48" fill="none"><g stroke="#34C759" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#34C759"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#34C759"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#34C759"/></g></svg></div>
    <div>
      <div class="sess-part">가슴</div>
      <div class="sess-meta">2026-03-15 · 43분</div>
    </div>
  </div>

  <div class="sec-title">메모</div>
  <div class="memo-card">
    <div class="memo-text">벤치프레스 무게 올림 80kg 성공</div>
  </div>

  <div class="sec-title">운동 세부사항</div>
  <div class="stats-card">
    <div class="stats-grid">
      <div><div class="stat-label">운동 시간</div><div class="stat-val">0:43:00</div></div>
      <div><div class="stat-label">활동 칼로리</div><div class="stat-val">262KCAL</div></div>
      <div><div class="stat-label">세트수</div><div class="stat-val">18세트</div></div>
      <div><div class="stat-label">평균 심박수</div><div class="stat-val">126BPM</div></div>
    </div>
  </div>

  <div class="sec-title">심박수</div>
  <div class="hr-card">
    <div class="hr-chart">
      <svg viewBox="0 0 320 160" preserveAspectRatio="none">
        <line x1="0" y1="20" x2="320" y2="20" stroke="#D4883A" stroke-width=".6" stroke-dasharray="4 3" opacity=".3"/>
        <line x1="0" y1="70" x2="320" y2="70" stroke="#D4883A" stroke-width=".6" stroke-dasharray="4 3" opacity=".3"/>
        <line x1="0" y1="120" x2="320" y2="120" stroke="#D4883A" stroke-width=".6" stroke-dasharray="4 3" opacity=".3"/>
        <path d="M0,130 L10,110 25,60 35,30 45,55 55,90 65,45 80,25 90,50 105,80 115,55 130,70 145,40 155,65 170,50 185,75 195,55 210,70 220,50 235,65 245,45 255,60 265,50 275,65 285,45 300,55 310,40 320,55 L320,160 L0,160Z" fill="url(#hrGradDark)" opacity=".3"/>
        <path d="M0,130 L10,110 25,60 35,30 45,55 55,90 65,45 80,25 90,50 105,80 115,55 130,70 145,40 155,65 170,50 185,75 195,55 210,70 220,50 235,65 245,45 255,60 265,50 275,65 285,45 300,55 310,40 320,55" fill="none" stroke="#D4883A" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="80" cy="25" r="4" fill="#E74C3C"/>
        <line x1="0" y1="70" x2="320" y2="70" stroke="#D4883A" stroke-width="1" stroke-dasharray="5 3" opacity=".6"/>
        <text x="275" y="65" font-size="10" fill="#D4883A" font-weight="600">평균 126</text>
        <circle cx="0" cy="130" r="4" fill="none" stroke="#8C7E6E" stroke-width="1.5"/>
        <text x="0" y="148" font-size="9" fill="#B8A898">85</text>
        <circle cx="320" cy="55" r="4" fill="none" stroke="#8C7E6E" stroke-width="1.5"/>
        <text x="306" y="73" font-size="9" fill="#B8A898">87</text>
        <defs>
          <linearGradient id="hrGradDark" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#D4883A" stop-opacity=".5"/>
            <stop offset="100%" stop-color="#D4883A" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="hr-footer">
      <div class="hr-foot-label">시작</div>
      <div class="hr-foot-center">평균 126BPM</div>
      <div class="hr-foot-label">종료</div>
    </div>
  </div>

  <div class="sec-title">지도</div>
  <div class="map-card">
    <div class="map-dot"></div>
    <div class="map-label">운동 위치</div>
  </div>

  <div class="bottom-action">
    <button class="action-btn"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="6" y="3" width="12" height="16" rx="2" stroke="rgba(255,255,255,.7)" stroke-width="1.8"/><path d="M9 7h6M9 10h6M9 13h3" stroke="rgba(255,255,255,.7)" stroke-width="1.5" stroke-linecap="round"/><path d="M10 19v2h4v-2" stroke="rgba(255,255,255,.7)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
  </div>

</div>
</body>
</html>
