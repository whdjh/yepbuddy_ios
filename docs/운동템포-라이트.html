<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;padding-bottom:110px;
}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600}
.status-r{display:flex;gap:6px;align-items:center}
.content{padding:0 20px}

.page-title{font-size:30px;font-weight:700;margin-top:16px;color:#3A2A1A}
.page-sub{font-size:14px;color:#876B45;margin-top:4px;margin-bottom:20px}

/* Toggle */
.toggle-wrap{display:flex;background:#EDE4D6;border-radius:14px;padding:4px;margin-bottom:24px}
.toggle-btn{flex:1;height:44px;border:none;border-radius:11px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;background:transparent;color:#876B45}
.toggle-btn.on{background:#FAF7F2;color:#3A2A1A;box-shadow:0 1px 4px rgba(58,42,26,.08)}

/* Status label */
.status-label{text-align:center;font-size:15px;font-weight:600;color:#9B7E56;margin-bottom:8px}

/* Big ring */
.ring-area{display:flex;justify-content:center;margin-bottom:16px}
.ring-outer{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center}
.ring-outer svg{position:absolute;top:0;left:0}
.ring-center{text-align:center;position:relative;z-index:1}
.ring-big-num{font-size:56px;font-weight:700;color:#3A2A1A}
.ring-sub{font-size:14px;color:#876B45;margin-top:2px}

/* Info row */
.info-row{display:flex;justify-content:center;gap:32px;margin-bottom:24px}
.info-col{text-align:center}
.info-label{font-size:13px;color:#876B45;margin-bottom:4px}
.info-val{font-size:16px;font-weight:700;color:#3A2A1A}

/* Stepper cards */
.stepper-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.stepper{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px;border-radius:16px;
  background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 12px rgba(58,42,26,.05);
}
.step-btn{
  width:44px;height:44px;border-radius:12px;border:none;
  background:#EDE4D6;font-size:20px;font-weight:600;color:#3A2A1A;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.step-center{text-align:center;flex:1}
.step-label{font-size:12px;color:#876B45;font-weight:500}
.step-val{font-size:24px;font-weight:700;color:#3A2A1A;margin-top:2px}
.step-unit{font-size:14px;font-weight:500;color:#876B45}

/* Rest stepper - wider */
.stepper-rest{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 20px;border-radius:16px;
  background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 12px rgba(58,42,26,.05);
  margin-bottom:24px;
}
.rest-jump{
  width:44px;height:44px;border-radius:12px;border:none;
  background:#EDE4D6;font-size:13px;font-weight:700;color:#876B45;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.rest-center{text-align:center;flex:1;min-width:80px}
.rest-label{font-size:12px;color:#876B45;font-weight:500}
.rest-val{font-size:28px;font-weight:700;color:#3A2A1A;margin-top:2px}
.rest-unit{font-size:14px;font-weight:500;color:#876B45}

/* Start button */
.btn-start{
  width:100%;height:56px;border-radius:14px;border:none;
  background:#9B7E56;color:#FAF7F2;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
}

/* Dock */
.dock{position:absolute;bottom:0;left:0;right:0;z-index:100;padding:0 20px 8px;background:linear-gradient(to top,#FAF7F2 60%,rgba(250,247,242,0))}
.pill{display:flex;align-items:center;background:#3A2A1A;border-radius:22px;padding:6px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.pill-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;border-radius:16px;padding:10px 0;cursor:pointer;min-height:52px}
.pill-btn.on{background:#9B7E56}
.pill-ic{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.pill-ic svg{width:20px;height:20px}
.pill-lb{font-size:11px;font-weight:600;color:rgba(250,247,242,.7)}
.pill-btn.on .pill-lb{color:#FAF7F2}
.pill-btn .pill-ic svg *{stroke:rgba(250,247,242,.7);fill:none}
.pill-btn.on .pill-ic svg *{stroke:#FAF7F2}
.home-ind{width:134px;height:5px;background:#3A2A1A;opacity:.15;border-radius:3px;margin:8px auto 0}
</style>
</head>
<body>
<div class="island"></div>
<div class="status"><span>9:41</span><div class="status-r"><svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#3A2A1A"/></svg><svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#3A2A1A" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#3A2A1A"/><path d="M14.5 4.5v3" stroke="#3A2A1A" stroke-width="1.5" stroke-linecap="round"/></svg></div></div>

<div class="content">
  <div class="page-title">템포</div>
  <div class="page-sub">수축·이완 타이밍에 집중하세요</div>

  <div class="toggle-wrap">
    <button class="toggle-btn on">수축 먼저</button>
    <button class="toggle-btn">이완 먼저</button>
  </div>

  <div class="status-label">대기 중</div>

  <div class="ring-area">
    <div class="ring-outer">
      <svg width="200" height="200" viewBox="0 0 200 200"><circle cx="100" cy="100" r="85" fill="none" stroke="#EDE4D6" stroke-width="12" transform="rotate(-90 100 100)"/></svg>
      <div class="ring-center"><div class="ring-big-num">0</div><div class="ring-sub">0 / 0 세트</div></div>
    </div>
  </div>

  <div class="info-row">
    <div class="info-col"><div class="info-label">현재 세트</div><div class="info-val">—</div></div>
    <div class="info-col"><div class="info-label">현재 횟수</div><div class="info-val">—</div></div>
    <div class="info-col"><div class="info-label">구간</div><div class="info-val">—</div></div>
  </div>

  <div class="stepper-grid">
    <div class="stepper"><button class="step-btn">−</button><div class="step-center"><div class="step-label">수축</div><div class="step-val">3<span class="step-unit">초</span></div></div><button class="step-btn">+</button></div>
    <div class="stepper"><button class="step-btn">−</button><div class="step-center"><div class="step-label">이완</div><div class="step-val">3<span class="step-unit">초</span></div></div><button class="step-btn">+</button></div>
    <div class="stepper"><button class="step-btn">−</button><div class="step-center"><div class="step-label">횟수</div><div class="step-val">10<span class="step-unit">회</span></div></div><button class="step-btn">+</button></div>
    <div class="stepper"><button class="step-btn">−</button><div class="step-center"><div class="step-label">세트</div><div class="step-val">3<span class="step-unit">세트</span></div></div><button class="step-btn">+</button></div>
  </div>

  <div class="stepper-rest">
    <button class="rest-jump">−10</button>
    <button class="step-btn">−</button>
    <div class="rest-center"><div class="rest-label">휴식</div><div class="rest-val">60<span class="rest-unit">초</span></div></div>
    <button class="step-btn">+</button>
    <button class="rest-jump">+10</button>
  </div>

  <button class="btn-start">시작</button>
</div>

<div class="dock">
  <div class="pill">
    <button class="pill-btn"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="4" y="13" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="13" y="4" width="7" height="7" rx="1.5" stroke-width="1.8"/><rect x="13" y="13" width="7" height="7" rx="1.5" stroke-width="1.8"/></svg></span><span class="pill-lb">일지</span></button>
    <button class="pill-btn on"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke-width="1.8"/><path d="M12 8v4l2.5 2.5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="pill-lb">템포</span></button>
    <button class="pill-btn"><span class="pill-ic"><svg viewBox="0 0 24 24" fill="none"><path d="M8 12a4 4 0 108 0 4 4 0 00-8 0z" stroke-width="1.8"/><path d="M12 4v2M12 18v2M4 12h2M18 12h2" stroke-width="1.8" stroke-linecap="round"/></svg></span><span class="pill-lb">프로틴</span></button>
  </div>
  <div class="home-ind"></div>
</div>
</body>
</html>
