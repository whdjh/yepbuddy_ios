<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;min-height:852px;background:#FAF7F2;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#3A2A1A;font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;
  position:relative;overflow-x:hidden;padding-bottom:40px;
}
.island{width:126px;height:36px;background:#1C1C1E;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600}
.status-r{display:flex;gap:6px;align-items:center}
.content{padding:0 20px}

.hdr{padding:16px 0 4px;display:flex;align-items:center;gap:12px}
.bk{width:44px;height:44px;border-radius:50%;border:none;background:#EDE4D6;display:flex;align-items:center;justify-content:center;cursor:pointer}
.hdr h2{flex:1;text-align:center;font-size:22px;font-weight:700;color:#3A2A1A}
.sp{width:44px}

/* Product header */
.prod-hdr{margin-top:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.prod-title{font-size:24px;font-weight:700;color:#3A2A1A}
.badge{padding:4px 10px;border-radius:8px;font-size:12px;font-weight:700}
.badge-mid{background:#EDE4D6;color:#876B45}
.prod-spec{font-size:14px;color:#876B45;margin-top:6px;width:100%}

/* Feature card */
.feat-card{
  margin-top:24px;padding:20px;border-radius:16px;
  background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 12px rgba(58,42,26,.05);
}
.feat-title{font-size:16px;font-weight:700;margin-bottom:12px;color:#3A2A1A}
.feat-list{padding-left:20px}
.feat-list li{font-size:14px;color:#3A2A1A;margin-bottom:6px;font-weight:500}

/* Price */
.price-row{margin-top:28px;display:flex;align-items:baseline;gap:8px}
.price-label{font-size:14px;color:#876B45;font-weight:500}
.price-val{font-size:32px;font-weight:700;color:#3A2A1A}
.price-per{font-size:16px;color:#876B45;font-weight:500}

/* Chart card */
.chart-card{
  margin-top:20px;padding:20px;border-radius:16px;
  background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.75);
  box-shadow:0 2px 12px rgba(58,42,26,.05);
}
.chart-area{height:200px;position:relative}
.chart-area svg{width:100%;height:100%}

/* CTA */
.btn-cta{
  width:100%;height:56px;border-radius:14px;border:none;
  background:#9B7E56;color:#FAF7F2;
  font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;
  margin-top:28px;
}
</style>
</head>
<body>
<div class="island"></div>
<div class="status"><span>9:41</span><div class="status-r"><svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#3A2A1A" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#3A2A1A"/></svg><svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#3A2A1A" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#3A2A1A"/><path d="M14.5 4.5v3" stroke="#3A2A1A" stroke-width="1.5" stroke-linecap="round"/></svg></div></div>

<div class="content">
  <div class="hdr">
    <button class="bk"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M12.5 4L6.5 10l6 6" stroke="#3A2A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <h2>상세 정보</h2>
    <div class="sp"></div>
  </div>

  <div class="prod-hdr">
    <span class="prod-title">옵티멈 골드 스탠다드 웨이</span>
    <span class="badge badge-mid">중간</span>
    <div class="prod-spec">2268g · WPC · 초코맛</div>
  </div>

  <div class="feat-card">
    <div class="feat-title">특징</div>
    <ul class="feat-list">
      <li>인지도가 높음</li>
      <li>맛과 성분은 좋지만 가격이 비싼편</li>
    </ul>
  </div>

  <div class="price-row">
    <span class="price-label">현재가</span>
    <span class="price-val">116,690원</span>
    <span class="price-per">(52원/g)</span>
  </div>

  <div class="chart-card">
    <div class="chart-area">
      <svg viewBox="0 0 320 180" preserveAspectRatio="none">
        <!-- Y axis labels -->
        <text x="0" y="16" font-size="10" fill="#876B45">160,000</text>
        <text x="0" y="56" font-size="10" fill="#876B45">120,000</text>
        <text x="0" y="96" font-size="10" fill="#876B45">80,000</text>
        <text x="0" y="136" font-size="10" fill="#876B45">40,000</text>
        <text x="0" y="170" font-size="10" fill="#876B45">0,000</text>
        <!-- Grid lines -->
        <line x1="50" y1="12" x2="320" y2="12" stroke="#EDE4D6" stroke-width=".5"/>
        <line x1="50" y1="52" x2="320" y2="52" stroke="#EDE4D6" stroke-width=".5"/>
        <line x1="50" y1="92" x2="320" y2="92" stroke="#EDE4D6" stroke-width=".5"/>
        <line x1="50" y1="132" x2="320" y2="132" stroke="#EDE4D6" stroke-width=".5"/>
        <!-- Fill -->
        <path d="M55,72 L80,68 100,75 120,80 145,82 165,90 185,78 205,60 225,50 245,42 260,48 275,45 295,50 310,48 L310,155 L55,155Z" fill="url(#priceGrad)" opacity=".25"/>
        <!-- Line -->
        <path d="M55,72 L80,68 100,75 120,80 145,82 165,90 185,78 205,60 225,50 245,42 260,48 275,45 295,50 310,48" fill="none" stroke="#9B7E56" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        <!-- Current dot -->
        <circle cx="310" cy="48" r="4" fill="#9B7E56"/>
        <!-- X axis -->
        <text x="55" y="170" font-size="9" fill="#876B45">24-01</text>
        <text x="100" y="170" font-size="9" fill="#876B45">24-06</text>
        <text x="145" y="170" font-size="9" fill="#876B45">24-11</text>
        <text x="190" y="170" font-size="9" fill="#876B45">25-03</text>
        <text x="235" y="170" font-size="9" fill="#876B45">25-10</text>
        <text x="270" y="170" font-size="9" fill="#876B45">25-12</text>
        <text x="302" y="170" font-size="9" fill="#876B45">26-03</text>
        <defs>
          <linearGradient id="priceGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9B7E56" stop-opacity=".4"/>
            <stop offset="100%" stop-color="#9B7E56" stop-opacity="0"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <button class="btn-cta">구매하러 가기</button>
</div>
</body>
</html>
