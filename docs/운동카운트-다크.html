<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:393px;height:852px;
  background:#231E17;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Pretendard',sans-serif;
  color:#FFFFFF;font-size:15px;line-height:1.4;
  -webkit-font-smoothing:antialiased;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.island{width:126px;height:36px;background:#000;border-radius:20px;position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:50}
.status{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 28px 0;height:54px;font-size:15px;font-weight:600;color:#fff}
.status-r{display:flex;gap:6px;align-items:center}

/* Dumbbell icon */
.top-icon{
  width:48px;height:48px;border-radius:12px;
  background:rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:40px;
}

/* Ring */
.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:240px;height:240px}
.ring-wrap svg{position:absolute;top:0;left:0}
.ring-num{font-size:96px;font-weight:700;color:#fff;position:relative;z-index:1}

/* Label */
.ring-label{font-size:18px;color:rgba(255,255,255,.6);margin-top:32px;font-weight:500}
</style>
</head>
<body>

<div class="island"></div>
<div class="status">
  <span>9:41</span>
  <div class="status-r">
    <svg width="18" height="12" viewBox="0 0 18 12"><path d="M1 4.2C3.7 1.5 7.6 0 9 0s5.3 1.5 8 4.2" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M3.5 7C5.3 5.2 7.5 4 9 4s3.7 1.2 5.5 3" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><circle cx="9" cy="10.5" r="1.5" fill="#fff"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="1" width="13" height="10" rx="2" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="2" y="3" width="9" height="6" rx="1" fill="#fff"/><path d="M14.5 4.5v3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
</div>

<div class="top-icon">
  <svg width="22" height="22" viewBox="0 0 48 48" fill="none"><g stroke="#E0D6C8" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="24" x2="36" y2="24"/><rect x="14" y="18" width="4" height="12" rx="1" fill="#E0D6C8"/><rect x="30" y="18" width="4" height="12" rx="1" fill="#E0D6C8"/><rect x="10" y="20" width="4" height="8" rx="1" fill="#E0D6C8"/><rect x="34" y="20" width="4" height="8" rx="1" fill="#E0D6C8"/></g></svg>
</div>

<div class="ring-wrap">
  <svg width="240" height="240" viewBox="0 0 240 240">
    <!-- Track -->
    <circle cx="120" cy="120" r="105" fill="none" stroke="rgba(155,126,86,.25)" stroke-width="14" transform="rotate(-90 120 120)"/>
    <!-- Progress ~75% -->
    <circle cx="120" cy="120" r="105" fill="none" stroke="#C8AD7E" stroke-width="14" stroke-dasharray="659.7" stroke-dashoffset="165" stroke-linecap="round" transform="rotate(-90 120 120)"/>
  </svg>
  <div class="ring-num">1</div>
</div>

<div class="ring-label">근력 강화 운동</div>

</body>
</html>
